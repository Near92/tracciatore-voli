<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Voli Live</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 10px; background: #1a1a24; color: #fff; text-align: center; }
        .search-container { max-width: 500px; margin: 10px auto; display: flex; gap: 10px; padding: 0 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 6px; font-size: 16px; background: #2a2a35; color: white; min-width: 0; }
        button { padding: 12px 20px; background: #00e676; color: #000; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .radar-wrapper { position: relative; width: 100%; height: calc(100vh - 90px); min-height: 500px; margin-top: 10px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; background: #1a1a24; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="flightCode" placeholder="Inserisci volo (es. RYR297X, AZA204)" />
        <button onclick="trackFlight()">CERCA</button>
    </div>
    
    <div class="radar-wrapper">
        <!-- Il radar parte centrato sull'Europa, pronto a ricevere i comandi dell'utente -->
        <iframe id="radarFrame" src="https://www.radarbox.com/widget?lat=42.0&lng=12.5&z=5&theme=dark&style=satellite"></iframe>
    </div>

    <script>
        function trackFlight() {
            const code = document.getElementById('flightCode').value.trim().toUpperCase();
            const frame = document.getElementById('radarFrame');
            
            if (!code) {
                alert("Per favore, inserisci un codice volo.");
                return;
            }

            // Cambia l'indirizzo dell'iframe puntando direttamente al tracciamento in tempo reale del volo inserito
            frame.src = `https://www.radarbox.com/widget?flight=${code}&theme=dark&style=dark`;
        }
    </script>
</body>
</html>
