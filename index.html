<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vola con Pepy - Radar Voli Rapido</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 30px 15px; background: #1a1a24; color: #fff; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; background: #2a2a35; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        h2 { margin-top: 0; color: #00e676; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 8px; font-size: 18px; background: #1a1a24; color: white; box-sizing: border-box; text-align: center; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background: #00e676; color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00b359; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Vola con Pepy<h2>
        <h3>Radar Voli Live</h3>
        <p>Inserisci il codice volo per aprire il tracciamento radar ufficiale.</p>
        
        <input type="text" id="flightCode" placeholder="es. RYR297X, FR1291" />
        <button onclick="openRadar()">Traccia Volo</button>
    </div>

    <script>
        function openRadar() {
            const code = document.getElementById('flightCode').value.trim().toUpperCase();
            
            if (!code) {
                alert("Per favore, inserisci un codice volo.");
                return;
            }

            // Il codice viene passato esattamente come scritto dall'utente
            const targetUrl = `https://www.flightradar24.com/data/flights/${code}`;
            
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
